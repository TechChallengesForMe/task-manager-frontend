<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMCTS Task Manager | Caseworker Tasks</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-gavel"></i>
                <h2>HMCTS Tasks</h2>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-view="all">
                    <i class="fas fa-tasks"></i>
                    <span>All Tasks</span>
                </a>
                <a href="#" class="nav-item" data-view="pending">
                    <i class="fas fa-clock"></i>
                    <span>Pending</span>
                </a>
                <a href="#" class="nav-item" data-view="in-progress">
                    <i class="fas fa-spinner"></i>
                    <span>In Progress</span>
                </a>
                <a href="#" class="nav-item" data-view="completed">
                    <i class="fas fa-check-circle"></i>
                    <span>Completed</span>
                </a>
            </nav>
            <button class="new-task-btn" id="newTaskBtn">
                <i class="fas fa-plus"></i>
                New Task
            </button>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <h1 id="pageTitle">All Tasks</h1>
                <div class="header-stats">
                    <div class="stat">
                        <span class="stat-label">Total</span>
                        <span class="stat-value" id="totalCount">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Completed</span>
                        <span class="stat-value" id="completedCount">0</span>
                    </div>
                </div>
            </header>

            <!-- Tasks List -->
            <div class="tasks-container">
                <div id="tasksList" class="tasks-grid">
                    <div class="loading-spinner">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Loading tasks...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Create/Edit Task -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Create New Task</h2>
                <span class="close-modal">&times;</span>
            </div>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                
                <div class="form-group">
                    <label for="title">Title <span class="required">*</span></label>
                    <input type="text" id="title" name="title" required maxlength="200" placeholder="Enter task title">
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="4" placeholder="Enter task description (optional)"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="status">Status <span class="required">*</span></label>
                        <select id="status" name="status" required>
                            <option value="pending">📋 Pending</option>
                            <option value="in-progress">⚙️ In Progress</option>
                            <option value="completed">✅ Completed</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="dueDate">Due Date/Time <span class="required">*</span></label>
                        <input type="datetime-local" id="dueDate" name="dueDate" required>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content delete-modal">
            <div class="modal-header">
                <h2>Delete Task</h2>
                <span class="close-delete-modal">&times;</span>
            </div>
            <div class="modal-body">
                <i class="fas fa-exclamation-triangle"></i>
                <p>Are you sure you want to delete this task?</p>
                <p class="delete-warning">This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelDeleteBtn">Cancel</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Custom JS -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
